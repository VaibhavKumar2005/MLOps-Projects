version: "3.8"

services:
  # Message Queue
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - mlops-network
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - mlops-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MLflow Server (Experiment Tracking & Model Registry)
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    environment:
      - MLFLOW_BACKEND_STORE_URI=file:///mlflow/mlruns
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri file:///mlflow/mlruns
    networks:
      - mlops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Data Producer (Kafka Producer)
  producer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlops-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CLIENT_ID: stock-market-producer
      KAFKA_RAW_TOPIC: stock.raw
      TWELVEDATA_API_KEY: ${TWELVEDATA_API_KEY:-demo}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: python -m src.kafka_producer
    networks:
      - mlops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import src.kafka_producer; print('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Feature Engineering (Streaming Consumer)
  feature-engineering:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlops-feature-engineering
    depends_on:
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_RAW_TOPIC: stock.raw
      KAFKA_FEATURES_TOPIC: stock.features
      KAFKA_FEATURES_GROUP_ID: stock-feature-engineering
      MLFLOW_TRACKING_URI: http://mlflow:5000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: python -m src.kafka_feature_engineering
    networks:
      - mlops-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # Prediction Service (Streaming Consumer)
  prediction:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlops-prediction
    depends_on:
      kafka:
        condition: service_healthy
      feature-engineering:
        condition: service_started
      mlflow:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_FEATURES_TOPIC: stock.features
      KAFKA_CLIENT_ID: stock-prediction-consumer
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_CHECKPOINT_DIR: /app/models
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: python -m src.prediction_consumer
    networks:
      - mlops-network
    restart: unless-stopped
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs

  # Drift Monitoring Service
  drift-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlops-drift-monitor
    depends_on:
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_FEATURES_TOPIC: stock.features
      KAFKA_CLIENT_ID: stock-drift-monitor
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DRIFT_THRESHOLD: ${DRIFT_THRESHOLD:-0.05}
      DRIFT_WINDOW_SIZE: ${DRIFT_WINDOW_SIZE:-500}
      DRIFT_CHECK_INTERVAL: ${DRIFT_CHECK_INTERVAL:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: python -m src.drift_monitor
    networks:
      - mlops-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models

  # Training Job (Batch Processing)
  # Uncomment to enable automated training
  # training:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: mlops-training
  #   depends_on:
  #     mlflow:
  #       condition: service_healthy
  #   environment:
  #     MLFLOW_TRACKING_URI: http://mlflow:5000
  #     MODEL_CHECKPOINT_DIR: /app/models
  #     LOG_LEVEL: ${LOG_LEVEL:-INFO}
  #   command: python -m src.train_model
  #   networks:
  #     - mlops-network
  #   volumes:
  #     - ./data:/app/data
  #     - ./models:/app/models
  #     - ./logs:/app/logs
  #   restart: unless-stopped

networks:
  mlops-network:
    driver: bridge

volumes:
  zookeeper-data:
  kafka-data:
  mlflow-data:
